# ============================================================
# Docker / Cloud Profile — activate with: SPRING_PROFILES_ACTIVE=docker
# ============================================================
# Override these via environment variables in your container or cloud service.
# Example: -e SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/workforce

# Server
server.port=${PORT:8080}

# External Database (PostgreSQL example — override via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workforcedb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:workforce}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

# JPA / Hibernate — validate schema, do NOT auto-create in production
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false

# Disable H2 Console in container environments
spring.h2.console.enabled=false

# Actuator — expose health and readiness probes for Kubernetes
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Application info
info.app.name=Workforce Manager
info.app.version=1.0.0
info.app.profile=docker

# Logging — JSON format for cloud log aggregation
logging.level.com.example.workforce=INFO
logging.level.org.springframework.security=WARN
